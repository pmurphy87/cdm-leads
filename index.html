<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDM Intelligence Agent</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0d0d0f; color: #e8e8ec; min-height: 100vh; font-size: 14px; }
.topbar { background: #141416; border-bottom: 1px solid #2a2a2f; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 18px; font-weight: 700; color: #c8f04a; }
.logo span { font-size: 11px; font-weight: 400; color: #555; margin-left: 8px; }
.btn-run { background: #c8f04a; color: #0d0d0f; border: none; border-radius: 7px; padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-run:hover { background: #d4f55c; }
.btn-run:disabled { background: #2a2a2f; color: #555; cursor: not-allowed; }
.main { padding: 24px; max-width: 960px; margin: 0 auto; }
.key-box { background: #141416; border: 1px solid #2a2a2f; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
.key-box label { display: block; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
.key-box input { width: 100%; background: #1c1c1f; border: 1px solid #3a3a42; border-radius: 6px; padding: 12px 14px; font-size: 13px; font-family: monospace; color: #e8e8ec; outline: none; }
.key-box input:focus { border-color: #c8f04a; }
.pipeline { display: grid; grid-template-columns: repeat(4,1fr); border-radius: 10px; overflow: hidden; border: 1px solid #2a2a2f; margin-bottom: 16px; }
.pipe-step { background: #141416; padding: 14px 16px; border-right: 1px solid #2a2a2f; }
.pipe-step:last-child { border-right: none; }
.pipe-step.active { background: rgba(200,240,74,0.08); }
.pipe-step.done { background: rgba(61,217,179,0.06); }
.pipe-step.err { background: rgba(255,92,58,0.08); }
.pipe-num { font-size: 9px; color: #444; font-family: monospace; letter-spacing: 0.1em; margin-bottom: 4px; }
.pipe-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.pipe-status { font-size: 11px; font-family: monospace; color: #555; }
.pipe-step.active .pipe-status { color: #c8f04a; }
.pipe-step.done .pipe-status { color: #3dd9b3; }
.pipe-step.err .pipe-status { color: #ff5c3a; }
.log { background: #141416; border: 1px solid #2a2a2f; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; font-family: monospace; font-size: 12px; line-height: 1.9; max-height: 150px; overflow-y: auto; }
.log-line { color: #555; }
.log-line::before { content: "› "; color: #333; }
.log-line.info { color: #aaa; }
.log-line.ok { color: #3dd9b3; }
.log-line.warn { color: #ffaa2e; }
.log-line.err { color: #ff5c3a; }
.report-area { background: #141416; border: 1px solid #2a2a2f; border-radius: 10px; overflow: hidden; }
.report-toolbar { background: #1c1c1f; border-bottom: 1px solid #2a2a2f; padding: 11px 18px; display: flex; align-items: center; justify-content: space-between; }
.report-meta { font-size: 11px; color: #555; font-family: monospace; }
.tbtn { background: #1c1c1f; border: 1px solid #2a2a2f; color: #888; border-radius: 5px; padding: 5px 12px; font-size: 12px; cursor: pointer; margin-left: 8px; }
.tbtn:hover { color: #e8e8ec; border-color: #3a3a42; }
.tbtn.green { background: #1a2a1a; border-color: rgba(200,240,74,0.3); color: #c8f04a; }
.report-body { padding: 24px 28px; line-height: 1.75; font-size: 14px; color: #ccc; min-height: 200px; }
.empty { text-align: center; padding: 60px 20px; }
.empty-title { font-size: 18px; color: #444; margin-bottom: 8px; }
.empty-sub { font-size: 13px; color: #333; }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">CDM <span>INTELLIGENCE AGENT · V5</span></div>
  <button class="btn-run" id="btn-run" onclick="runAgents()"><span id="btn-text">Run Agents</span></button>
</div>
<div class="main">

  <div class="key-box">
    <label>Anthropic API Key — paste your full key below and it will be remembered</label>
    <input type="text" id="claude-key" placeholder="Paste your full Anthropic API key here (sk-ant-api03-...)">
  </div>

  <div class="pipeline">
    <div class="pipe-step" id="p1"><div class="pipe-num">AGENT 01</div><div class="pipe-name">Scout</div><div class="pipe-status" id="p1s">Ready</div></div>
    <div class="pipe-step" id="p2"><div class="pipe-num">AGENT 02</div><div class="pipe-name">Qualifier</div><div class="pipe-status" id="p2s">Waiting</div></div>
    <div class="pipe-step" id="p3"><div class="pipe-num">AGENT 03</div><div class="pipe-name">Researcher</div><div class="pipe-status" id="p3s">Waiting</div></div>
    <div class="pipe-step" id="p4"><div class="pipe-num">AGENT 04</div><div class="pipe-name">Report Builder</div><div class="pipe-status" id="p4s">Waiting</div></div>
  </div>

  <div class="log" id="log">
    <div class="log-line info">Ready. Paste your Anthropic API key above and click Run Agents.</div>
  </div>

  <div class="report-area">
    <div class="report-toolbar">
      <div class="report-meta" id="report-meta">No report generated yet</div>
      <div>
        <button class="tbtn" onclick="copyReport()">Copy report</button>
        <button class="tbtn green" onclick="emailReport()">Email to Chip & Devlin</button>
      </div>
    </div>
    <div class="report-body" id="report-body">
      <div class="empty">
        <div class="empty-title">No report yet</div>
        <div class="empty-sub">Paste your API key above and click Run Agents.</div>
      </div>
    </div>
  </div>

</div>
<script>
var running = false;
var RAPID_KEY = "75f831979dmshabb4296be2a23eep1f1951jsn4462aa6c60ac";

// Load saved key on startup
window.addEventListener('load', function() {
  var saved = localStorage.getItem('cdm_claude_key');
  if (saved) {
    document.getElementById('claude-key').value = saved;
    addLog('API key loaded from saved settings.', 'ok');
  }
});

// Save key whenever user types
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('claude-key').addEventListener('input', function() {
    var val = this.value.trim();
    if (val.length > 30) {
      localStorage.setItem('cdm_claude_key', val);
    }
  });
});

function getClaudeKey() {
  var fromField = document.getElementById('claude-key').value.trim();
  var fromStorage = localStorage.getItem('cdm_claude_key') || '';
  return fromField.length > 30 ? fromField : fromStorage;
}

function setStep(n, state, txt) {
  document.getElementById('p'+n).className = 'pipe-step ' + state;
  document.getElementById('p'+n+'s').textContent = txt;
}

function addLog(msg, type) {
  var l = document.getElementById('log');
  var d = document.createElement('div');
  d.className = 'log-line ' + (type || '');
  d.textContent = msg;
  l.appendChild(d);
  l.scrollTop = l.scrollHeight;
}

function clearLog() { document.getElementById('log').innerHTML = ''; }

async function searchJobs(query) {
  var url = 'https://jsearch.p.rapidapi.com/search?query=' + encodeURIComponent(query) + '&page=1&num_pages=1&date_posted=month&country=us';
  var r = await fetch(url, {
    method: 'GET',
    headers: { 'x-rapidapi-host': 'jsearch.p.rapidapi.com', 'x-rapidapi-key': RAPID_KEY }
  });
  if (!r.ok) throw new Error('JSearch error ' + r.status);
  var d = await r.json();
  return d.data || [];
}

async function callClaude(system, user) {
  var key = getClaudeKey();
  if (!key) throw new Error('No Anthropic API key found. Please paste your key in the field above.');
  var r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 6000, system: system, messages: [{ role: 'user', content: user }] })
  });
  if (!r.ok) {
    var e = await r.json().catch(function(){return {};});
    throw new Error('Claude API ' + r.status + ': ' + (e.error && e.error.message ? e.error.message : r.statusText));
  }
  var d = await r.json();
  return d.content[0].text;
}

function parseJSON(raw) {
  var s = raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
  try { return JSON.parse(s); } catch(e) {
    var m = s.match(/\[[\s\S]*\]/);
    if (m) { try { return JSON.parse(m[0]); } catch(e2) {} }
    throw new Error('Could not parse agent response as JSON');
  }
}

var SD_CITIES = ['san diego','carlsbad','la jolla','sorrento','chula vista','escondido','oceanside','vista','san marcos','el cajon','miramar','kearny','encinitas','del mar','poway','santee','national city','coronado'];
var EXCLUDED = ['qualcomm','apple','google','meta','amazon','microsoft','waymo','saic','bae systems','lockheed','northrop','raytheon','booz allen','leidos','general dynamics','boeing','l3harris','cisco','oracle','salesforce','servicenow','workday','nvidia','intel','ibm','hewlett','deloitte','accenture','snowflake','palantir','databricks','crowdstrike','palo alto networks','zendesk','hubspot','stripe','adobe','autodesk','intuit','ebay','paypal','general atomics','science applications'];
var SKIP = ['staffing','recruiting','recruiter','talent acquisition','manpower','robert half','kelly services','randstad','adecco','insight global','apex systems','teksystems','tek systems','ziprecruiter','headhunter','staffmark','aerotek'];

function isBadCompany(name) {
  var n = name.toLowerCase();
  return EXCLUDED.some(function(k){ return n.includes(k); }) || SKIP.some(function(k){ return n.includes(k); });
}

function isSanDiego(job) {
  var state = (job.job_state || '').toUpperCase();
  if (state && state !== 'CA' && state.length === 2) return false;
  var all = [job.job_city, job.job_state, job.job_location, job.employer_headquarters].map(function(f){ return (f||'').toLowerCase(); }).join(' ');
  if (SD_CITIES.some(function(c){ return all.includes(c); })) return true;
  if ((state === 'CA' || !state) && (!job.job_city || job.job_city.toLowerCase().includes('remote'))) return true;
  return false;
}

function extractCompanies(jobs) {
  var map = {};
  jobs.forEach(function(job) {
    var name = job.employer_name;
    if (!name || isBadCompany(name) || !isSanDiego(job)) return;
    if (!map[name]) map[name] = { company_name: name, location: (job.job_city||'San Diego')+', CA', website: job.employer_website||'', roles: [] };
    map[name].roles.push({ title: job.job_title, posted: job.job_posted_at_datetime_utc, snippet: (job.job_description||'').substring(0,200) });
  });
  return Object.values(map);
}

async function runAgents() {
  if (running) return;
  var key = getClaudeKey();
  if (!key || key.length < 20) {
    alert('Please paste your Anthropic API key in the field above first.');
    document.getElementById('claude-key').focus();
    return;
  }

  running = true;
  clearLog();
  document.getElementById('btn-run').disabled = true;
  document.getElementById('btn-text').textContent = 'Running...';
  [1,2,3,4].forEach(function(n){ setStep(n,'',n===1?'Ready':'Waiting'); });

  try {
    // AGENT 1: SCOUT
    setStep(1,'active','Searching...');
    addLog('Agent 1 (Scout) — pulling live San Diego job postings...','info');

    var searches = ['software engineer San Diego CA','DevOps engineer San Diego CA','site reliability engineer San Diego CA','AI engineer San Diego CA','machine learning engineer San Diego CA','solutions engineer San Diego CA','backend engineer San Diego CA','platform engineer San Diego CA'];
    var allJobs = [];
    for (var i=0; i<searches.length; i++) {
      addLog('Searching: ' + searches[i]);
      try {
        var jobs = await searchJobs(searches[i]);
        allJobs = allJobs.concat(jobs);
        addLog('→ ' + jobs.length + ' results', 'ok');
      } catch(e) { addLog('Search error: ' + e.message, 'warn'); }
      await new Promise(function(r){ setTimeout(r, 400); });
    }

    var companies = extractCompanies(allJobs).slice(0, 20);
    addLog('Scout complete: ' + companies.length + ' San Diego companies found.', 'ok');
    setStep(1,'done', companies.length + ' found');
    if (companies.length === 0) throw new Error('No companies found. The location filter may be too strict — try again.');

    // AGENT 2: QUALIFIER
    setStep(2,'active','Scoring...');
    addLog('Agent 2 (Qualifier) — scoring HOT / WARM / COLD...','info');

    var allScored = [];
    var batchSize = 4;
    for (var b=0; b<companies.length; b+=batchSize) {
      var batch = companies.slice(b, b+batchSize);
      addLog('Scoring batch ' + (Math.floor(b/batchSize)+1) + ' of ' + Math.ceil(companies.length/batchSize) + '...');
      var s2 = 'You are a BD analyst for CDM Technology, a boutique IT staffing firm in Carlsbad San Diego with 20+ years experience. CDM places software engineers, DevOps, SREs, cloud engineers, AI/ML engineers, and Sales/Solutions Engineers. CDM works with ANY San Diego company.\n\nScore each company HOT, WARM, or COLD:\nHOT (2+ signals): multiple open roles; hard-to-fill titles (SRE, DevOps, AI/ML, Staff/Senior, Solutions Engineer); AI/ML roles; company scaling\nWARM (1 signal): any AI/ML or Solutions Eng role; 1-2 roles with difficulty\nCOLD: basic junior roles only; huge enterprise with full TA team\n\nKeep all text fields under 100 chars. Return ONLY valid JSON array:\n[{"company_name":"","score":"HOT","score_reasoning":"","key_pain_signal":"","cdm_fit":"","roles_of_interest":[],"has_ai_ml_opportunity":false,"has_sales_engineer_opportunity":false,"pass_to_next_agent":true}]';
      try {
        var raw2 = await callClaude(s2, 'Score these:\n' + JSON.stringify(batch, null, 1));
        var scored = parseJSON(raw2);
        allScored = allScored.concat(scored);
      } catch(e) { addLog('Batch issue: ' + e.message, 'warn'); }
    }

    var hot = allScored.filter(function(c){ return c.score==='HOT' && c.pass_to_next_agent; });
    var warm = allScored.filter(function(c){ return c.score==='WARM' && c.pass_to_next_agent; });
    addLog('Qualifier: ' + hot.length + ' HOT, ' + warm.length + ' WARM, ' + allScored.filter(function(c){return c.score==='COLD';}).length + ' COLD dropped.', 'ok');
    setStep(2,'done', hot.length + ' hot · ' + warm.length + ' warm');

    var passThrough = allScored.filter(function(c){ return c.pass_to_next_agent; }).slice(0,12);

    // AGENT 3: RESEARCHER
    setStep(3,'active','Researching...');
    addLog('Agent 3 (Researcher) — finding decision makers...','info');

    var withCtx = passThrough.map(function(c) {
      var raw = companies.find(function(q){ return q.company_name===c.company_name; });
      return Object.assign({}, c, { website: raw&&raw.website||'', location: raw&&raw.location||'San Diego, CA', sample_roles: (raw&&raw.roles||[]).slice(0,3).map(function(r){return r.title;}) });
    });

    var allContacts = [];
    for (var r=0; r<withCtx.length; r+=3) {
      var rbatch = withCtx.slice(r, r+3);
      var s3 = 'You are a sales intelligence researcher for CDM Technology, Carlsbad San Diego. Find the right decision maker — NEVER HR, TA, or Recruiting.\n\nTARGET: CTO, VP Engineering, Director Engineering, VP AI (ML roles), VP Sales/CRO (Sales Eng roles), Founder/CEO (small cos).\n\nReturn ONLY valid JSON array:\n[{"company_name":"","contact_name":"","contact_title":"","contact_linkedin_url":"https://linkedin.com/in/","contact_email":"","contact_email_confidence":"likely","years_at_company":"","recent_linkedin_activity":"","outreach_angle":""}]';
      try {
        var raw3 = await callClaude(s3, 'Find decision makers at:\n' + JSON.stringify(rbatch, null, 1));
        var contacts = parseJSON(raw3);
        allContacts = allContacts.concat(contacts);
      } catch(e) { addLog('Researcher issue: ' + e.message, 'warn'); }
    }
    addLog('Researcher found ' + allContacts.length + ' decision makers.', 'ok');
    setStep(3,'done', allContacts.length + ' contacts');

    // AGENT 4: REPORT
    setStep(4,'active','Writing report...');
    addLog('Agent 4 (Report Builder) — composing your lead report...','info');

    var today = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    var s4 = 'You are writing a biweekly lead intelligence report for Chip and Devlin at CDM Technology, a boutique IT recruiting firm in Carlsbad San Diego with 20+ years of local relationships. CDM places software engineers, DevOps, SREs, AI/ML engineers, and Sales Engineers.\n\nWrite clean HTML with inline styles. Dark theme (bg already #0d0d0f). No html/body tags.\n\nSTRUCTURE:\n1. Intro (background:#1c1c1f;border-radius:8px;padding:14px 16px;margin-bottom:20px;font-size:13px;color:#888;border-left:3px solid #2a2a2f): date, counts, one pattern\n2. AI/ML SPOTLIGHT section if any (title color:#3dd9b3)\n3. SALES ENG SPOTLIGHT if any (title color:#a78bfa)\n4. HOT LEADS (title color:#ff5c3a)\n5. WARM LEADS (title color:#ffaa2e)\n\nEACH LEAD CARD (padding:16px 18px;border-radius:8px;margin-bottom:14px;border-left:3px solid [color];background:rgba([r],[g],[b],0.07)):\n- Company name (font-size:16px;font-weight:700;color:#e8e8ec)\n- Score badge\n- Open roles, pain signal, CDM fit (font-size:13px;color:#888)\n- Decision maker details\n- Devlin Sales Nav action (background:rgba(200,240,74,0.06);border:1px solid rgba(200,240,74,0.18);border-radius:6px;padding:8px 12px;color:#a0b840;font-size:12px)\n- Outreach draft (background:#1a1a2e;border:1px solid #2a2a3f;border-radius:6px;padding:12px;font-size:13px;color:#8888aa;font-style:italic) — max 100 words, written as Chip, opens with specific observation, NEVER "I hope this finds you well" or "I wanted to reach out", closes with "Worth a quick call?" or "Happy to send profiles first"\n\nReturn ONLY the HTML. No markdown.';

    var raw4 = await callClaude(s4, 'Write CDM Intelligence Report for ' + today + '.\n\nData:\n' + JSON.stringify({hot:hot,warm:warm,contacts:allContacts,companies:withCtx}, null, 1));

    setStep(4,'done','Complete ✓');
    addLog('Report complete! ' + hot.length + ' hot, ' + warm.length + ' warm leads.', 'ok');

    var ts = new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
    document.getElementById('report-meta').textContent = 'Generated ' + ts + ' · LIVE DATA · ' + hot.length + ' hot · ' + warm.length + ' warm';
    document.getElementById('report-body').innerHTML = raw4;

  } catch(e) {
    addLog('ERROR: ' + e.message, 'err');
    [1,2,3,4].forEach(function(n){
      if (document.getElementById('p'+n).className.includes('active')) setStep(n,'err','Error');
    });
  } finally {
    running = false;
    document.getElementById('btn-run').disabled = false;
    document.getElementById('btn-text').textContent = 'Run Agents';
  }
}

function copyReport() {
  var text = document.getElementById('report-body').innerText;
  navigator.clipboard.writeText(text).then(function(){
    var b = event.target; b.textContent='Copied!'; b.style.color='#3dd9b3';
    setTimeout(function(){ b.textContent='Copy report'; b.style.color=''; }, 2000);
  });
}

function emailReport() {
  var text = document.getElementById('report-body').innerText;
  var date = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var subject = encodeURIComponent('CDM Intelligence Report — ' + date);
  var body = encodeURIComponent('Chip & Devlin,\n\nHere is your latest CDM Intelligence Report.\n\n' + text + '\n\n—\nGenerated by CDM Intelligence Agent\ncdm-leads.vercel.app');
  var to = 'chip@cdmtechnology.com,devlin@cdmtechnology.com';
  window.open('mailto:' + to + '?subject=' + subject + '&body=' + body);
}
</script>
</body>
</html>
